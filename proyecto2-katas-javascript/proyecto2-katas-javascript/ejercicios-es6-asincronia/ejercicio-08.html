<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game of Thrones Characters</title>
  <script src="ejercicio-08.js" defer></script>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #1a1a2e;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      min-height: 100vh;
    }

    h1 {
      color: #c9a84c;
      margin-bottom: 20px;
      letter-spacing: 2px;
    }

    select {
      padding: 10px 16px;
      font-size: 1rem;
      border-radius: 6px;
      border: 2px solid #c9a84c;
      background-color: #16213e;
      color: #e0e0e0;
      cursor: pointer;
      margin-bottom: 30px;
    }

    .character-image {
      width: 300px;
      border-radius: 12px;
      border: 3px solid #c9a84c;
      display: none;
    }
  </style>
</head>
<body>
  <h1>⚔️ Game of Thrones</h1>
  <select id="character-list">
    <option value="">-- Selecciona un personaje --</option>
  </select>
  <div>
    <img class="character-image" alt="Personaje">
  </div>
</body>
</html>
